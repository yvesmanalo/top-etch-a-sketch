<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>TOP's Etch-a-Sketch</title>
  </head>
  <body>
    <header>
      <h1>Etch-a-Sketch</h1>
    </header>
    <main>
      <p>Provide a valid number between 1 - 100 to set grid size.</p>
      <p id="note">
        Note: The provided number will be multiply to itself to set the grid
        size.
      </p>
      <input id="input" type="number" />
      <button id="set-grid-size-btn">Set Grid</button>
      <button id="reset-grid-btn">Reset Grid</button>
      <div id="grid-container"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
